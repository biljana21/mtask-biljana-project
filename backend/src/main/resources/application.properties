spring.application.name=backend

server.port=9005

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mastery_task_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

groq.api.key=your_api_key

#parser.image.strategy=GROQ
parser.image.strategy=OCR

tesseract.datapath=${TESSERACT_DATAPATH:C:/Program Files/Tesseract-OCR/tessdata}

logging.level.root=info
logging.level.org.springframework=warn
logging.level.org.springframework.web.servlet.resource=warn
logging.level.org.hibernate=error
logging.level.com.mastery_task=info

logging.file.name=./logs/mastery-task.log